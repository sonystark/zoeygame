        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .btn-shadow {
            box-shadow: 0 6px 0 rgb(0,0,0,0.15);
            transition: all 0.1s;
        }
        .btn-shadow:active {
            box-shadow: 0 0px 0 rgb(0,0,0,0.15);

        }

        }

        function renderQuiz() {
            if (!state.currentQuiz) {
                return `<button onclick="generateQuiz()" class="btn-shadow bg-purple-400 text-white font-black text-xl px-12 py-8 rounded-3xl animate-bounce">🎁 OPEN QUESTION</button>`;
            }

            const q = state.currentQuiz;
            let content = '';

            if (q.type === 1) {
                content = `
                    <div class="text-8xl mb-4 drop-shadow-xl bounce-in">${q.answerObj.emoji}</div>
                    <h3 class="text-xl font-black text-gray-700 mb-6">What is the first letter?</h3>
                    <div class="grid grid-cols-2 gap-3 w-full">
                        ${q.choices.map(c => `<button onclick="handleAnswer('${c}' === '${q.correct}')" class="btn-shadow bg-white text-3xl font-black py-4 rounded-2xl border-2 border-purple-100">${c}</button>`).join('')}
                    </div>`;
            } else if (q.type === 2) {
                content = `
					<button onclick="playAudio('${q.soundUrl}')" class="w-20 h-20 bg-blue-400 rounded-full flex items-center justify-center btn-shadow mb-4"><span class="text-4xl text-white">🔊</span></button>
                    <div class="w-16 h-16 bg-blue-400 rounded-full flex items-center justify-center mb-4"><span class="text-3xl text-white">💡</span></div>
                    <h3 class="text-lg font-bold text-blue-800 mb-6 text-center bg-blue-100 p-4 rounded-2xl">"${q.riddle}"</h3>
                    <div class="grid grid-cols-2 gap-3 w-full">
                        ${q.choices.map(c => `<button onclick="handleAnswer('${c.name}' === '${q.answerObj.name}')" class="btn-shadow bg-white text-4xl p-4 rounded-2xl">${c.emoji}</button>`).join('')}
                    </div>`;
            } else if (q.type === 3) {
                content = `
                    <h2 class="text-4xl font-black text-gray-800 mb-8 uppercase tracking-widest">${q.correct}</h2>
                    <h3 class="text-lg font-bold text-gray-500 mb-6">Which picture is it?</h3>
                    <div class="grid grid-cols-2 gap-3 w-full">
                        ${q.choices.map(c => `<button onclick="handleAnswer('${c.name}' === '${q.answerObj.name}')" class="btn-shadow bg-white text-4xl p-4 rounded-2xl">${c.emoji}</button>`).join('')}
                    </div>`;
            } else if (q.type === 4) {
                content = `
                    <button onclick="playAudio('${q.soundUrl}')" class="w-20 h-20 bg-teal-400 rounded-full flex items-center justify-center btn-shadow mb-6"><span class="text-4xl text-white">🎵</span></button>
                    <h3 class="text-xl font-black text-teal-800 mb-6">What sound is this?</h3>
                    <div class="grid grid-cols-2 gap-3 w-full">
                        ${q.choices.map(c => `<button onclick="handleAnswer('${c.name}' === '${q.answerObj.name}')" class="btn-shadow bg-white text-4xl p-4 rounded-2xl">${c.emoji}</button>`).join('')}
                    </div>`;
            }
            return content;
        }

        // --- EVENT HANDLERS ---
        function changeView(v) {
            state.view = v;
            state.feedback = null;
            render();
        }

        function setCategoryMenu() {
            state.view = 'category_select';
            render();
        }

        function startGame(gId, cat = null) {
            state.gameId = gId;
            state.category = cat;
            state.round = 1;
            state.score = 0;
            state.currentQuiz = null;
            state.feedback = null;
            state.view = 'playing';
            render();
        }

        function generateQuiz() {
            let q = {};
            if (state.gameId === 1) {
                const pool = MG1_DATA[state.category];
                const ans = pool[Math.floor(Math.random() * pool.length)];
                const correct = ans.name[0].toUpperCase();
                const wrong = shuffle(ALPHABETS.filter(a => a !== correct)).slice(0, 7);
                q = { type: 1, answerObj: ans, correct: correct, choices: shuffle([correct, ...wrong]) };
            } else if (state.gameId === 2) {
                const ans = MG2_DATA[Math.floor(Math.random() * MG2_DATA.length)];
                const otherOptions = shuffle(MG2_DATA.filter(a => a.name !== ans.name)).slice(0, 7);
                q = { type: 2, answerObj: ans, riddle: ans.riddle, soundUrl: ans.sound, choices: shuffle([ans, ...otherOptions]) };
            } else if (state.gameId === 3) {
                const ans = MG3_DATA[Math.floor(Math.random() * MG3_DATA.length)];
                const otherOptions = shuffle(MG3_DATA.filter(a => a.name !== ans.name)).slice(0, 7);
                q = { type: 3, answerObj: ans, correct: ans.name, choices: shuffle([ans, ...otherOptions]) };
            } else if (state.gameId === 4) {
                const ans = MG4_DATA[Math.floor(Math.random() * MG4_DATA.length)];
                const otherOptions = shuffle(MG4_DATA.filter(a => a.name !== ans.name)).slice(0, 7);
                q = { type: 4, answerObj: ans, soundUrl: ans.sound, choices: shuffle([ans, ...otherOptions]) };
            }
            state.currentQuiz = q;
            render();
        }

        function handleAnswer(isCorrect) {
            if (isCorrect) {
                state.score++;
                state.feedback = { type: 'correct', msg: "Excellent!", answer: state.currentQuiz.answerObj.name };
                playAudio(AUDIO_ASSETS.correct);
                if (window.confetti) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                state.feedback = { type: 'wrong', msg: "Oops! Try Again", answer: state.currentQuiz.answerObj.name };
                playAudio(AUDIO_ASSETS.wrong);
            }
            render();

            setTimeout(() => {
                if (state.round >= MAX_ROUNDS) {
                    state.view = 'result';
                    if (state.score === MAX_ROUNDS) playAudio(AUDIO_ASSETS.fanfare);
                } else {
                    state.round++;
                    state.currentQuiz = null;
                }
                state.feedback = null;
                render();
            }, 2500);
        }

        // Initial render
        window.onload = render;
    </script>
</body>
</html>
